name: Validate bot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q main.py bot

      - name: Import application
        run: python -c "from bot.app import DiscordBot; from bot.config import Settings"
